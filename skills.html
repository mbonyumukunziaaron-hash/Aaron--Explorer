<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills</title>
    <style>
        /* Include your shared styles here */
        .skills-container { padding: 80px 24px; max-width: 1000px; margin: 0 auto; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .skill-card { background: rgba(0, 0, 0, 0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(0, 191, 255, 0.2); transition: 0.3s; }
        .skill-card:hover { border-color: #00bfff; transform: translateY(-5px); }
        .skill-card h3 { color: #00bfff; margin-bottom: 10px; }
        * {background-color: #000000; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center;}
    </style>
</head>
<body>
    <!-- Navbar same as above -->
    <div class="skills-container">
        <h1>Technical <span>Expertise</span></h1>
        <div class="divider"></div>
        <div class="skills-grid">
            <div class="skill-card"><h3>Frontend</h3><p>HTML, CSS, Responsive Design</p></div>
            <div class="skill-card"><h3>Programming</h3><p>JavaScript (ES6+), Node.js</p></div>
            <div class="skill-card"><h3>UI/UX</h3><p>Modern SaaS Aesthetics, Figma Design</p></div>
            <div class="skill-card"><h3>Tools</h3><p>Git, VS Code, Browser DevTools</p></div>
        </div>
    </div>
</body>
</html>
